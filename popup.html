<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Watch Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>
      <svg class="logo" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/>
      </svg>
      YouTube Watch Tracker
    </h1>
    <span id="count-badge" class="badge">0</span>
  </header>

  <div class="toolbar">
    <button id="btn-clear" class="btn btn-danger" title="Clear all history">Clear List</button>
    <button id="btn-copy" class="btn btn-secondary" title="Copy history as JSON">Share List (JSON)</button>
  </div>

  <div id="empty-state" class="empty-state">
    <p>No videos recorded yet.</p>
    <p class="hint">Browse YouTube and videos will appear here automatically.</p>
  </div>

  <ul id="history-list" class="history-list hidden"></ul>

  <script src="popup.js"></script>
</body>
</html>
